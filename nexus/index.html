<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  NEXUS Intelligence Platform — index.html (Shell)                ║
  ║  Path    : / (racine du dépôt — GitHub Pages)                    ║
  ║                                                                  ║
  ║  Ce fichier est le shell de l'application.                       ║
  ║  Il contient uniquement la structure permanente :                ║
  ║    · Sidebar de navigation                                       ║
  ║    · En-tête (header)                                            ║
  ║    · Conteneur #main-views (vues injectées par loader.js)        ║
  ║    · Panneau d'ontologie (propriétés d'entité)                   ║
  ║                                                                  ║
  ║  Architecture modulaire :                                        ║
  ║    views/         → Vues HTML injectées dynamiquement            ║
  ║    js/app.js      → Composant Alpine.js principal                ║
  ║    js/loader.js   → Chargeur de vues + bootstrap Alpine          ║
  ║    js/data/       → Données simulées                             ║
  ║    js/modules/    → Chart.js, Vis.js, Leaflet                    ║
  ║    js/utils/      → Fonctions utilitaires                        ║
  ║    assets/css/    → Styles personnalisés                         ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a0f" />

  <!-- ── SEO ─────────────────────────────────────────────────── -->
  <title>NEXUS — Intelligence Platform</title>
  <meta name="description"
        content="NEXUS est une plateforme d'analyse d'intelligence avancée pour le suivi d'entités, l'analyse de connexions et la surveillance d'événements géospatiaux." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://votre-username.github.io/" />

  <!-- ── Open Graph ───────────────────────────────────────────── -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="NEXUS — Intelligence Platform" />
  <meta property="og:description" content="Plateforme d'intelligence Big Data — Analyse de graphes, géospatial, ontologie." />
  <meta property="og:locale"      content="fr_FR" />

  <!-- ── Preconnect DNS (performance) ────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://basemaps.cartocdn.com" />

  <!-- ── Polices IBM Plex ─────────────────────────────────────── -->
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" />

  <!-- ── Leaflet CSS ──────────────────────────────────────────── -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
        crossorigin="" />

  <!-- ── Styles personnalisés ─────────────────────────────────── -->
  <link rel="stylesheet" href="./assets/css/main.css" />

  <!-- ── Tailwind CDN config (AVANT le script Tailwind) ──────── -->
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            void:    '#070a0f',
            surface: '#0c1117',
            panel:   '#111827',
            ink:     '#1a2535',
            neon:    '#00e5ff',
            signal:  '#ffb300',
            threat:  '#ff3b57',
            clear:   '#00c896',
          },
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['"IBM Plex Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- ── Tailwind CSS CDN ─────────────────────────────────────── -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="bg-void text-gray-200 font-sans antialiased overflow-hidden h-screen"
  aria-label="NEXUS Intelligence Platform"
>

  <!-- ════════════════════════════════════════════════════════════
       ÉCRAN DE DÉMARRAGE (masqué par loader.js après init)
       ════════════════════════════════════════════════════════════ -->
  <div
    id="boot-screen"
    role="status"
    aria-live="polite"
    aria-label="Chargement de NEXUS Intelligence Platform"
    style="position:fixed;inset:0;background:#070a0f;z-index:9999;
           display:flex;align-items:center;justify-content:center;
           flex-direction:column;gap:8px;"
  >
    <!-- Logo hexagone -->
    <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true" style="margin-bottom:4px;">
      <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"
               stroke="#00e5ff" stroke-width="1.5" fill="none"/>
      <polygon points="12,7 17,9.5 17,14.5 12,17 7,14.5 7,9.5"
               stroke="#00e5ff" stroke-width="1" fill="rgba(0,229,255,.08)"/>
      <circle cx="12" cy="12" r="2" fill="#00e5ff"/>
    </svg>
    <div style="font-family:'IBM Plex Mono',monospace;color:#00e5ff;font-size:11px;
                letter-spacing:.25em;text-shadow:0 0 14px rgba(0,229,255,.65);">
      NEXUS
    </div>
    <div style="font-family:'IBM Plex Mono',monospace;color:#1a2535;font-size:8px;
                letter-spacing:.15em;animation:blink 1.1s step-end infinite;">
      INITIALISATION…
    </div>
    <style>@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}</style>
  </div>


  <!-- ════════════════════════════════════════════════════════════
       APPLICATION PRINCIPALE (Alpine.js)
       x-cloak : masqué jusqu'à ce qu'Alpine supprime l'attribut
       ════════════════════════════════════════════════════════════ -->
  <div
    id="app"
    x-data="palantirApp()"
    x-init="init()"
    x-cloak
    class="flex h-screen overflow-hidden"
    role="application"
    aria-label="Interface principale NEXUS"
  >

    <!-- ──────────────────────────────────────────────────────────
         SIDEBAR DE NAVIGATION
         ──────────────────────────────────────────────────────────  -->
    <aside
      class="flex flex-col bg-surface border-r border-ink flex-shrink-0 z-20 transition-all duration-300"
      :class="sidebarOpen ? 'w-56' : 'w-14'"
      role="navigation"
      aria-label="Navigation principale"
    >

      <!-- Marque / Logo -->
      <div class="flex items-center gap-3 px-3 py-4 border-b border-ink h-14 overflow-hidden">
        <div class="flex-shrink-0" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24">
            <polygon points="12,2 21,7 21,17 12,22 3,17 3,7"
                     stroke="#00e5ff" stroke-width="1.5" fill="none"/>
            <polygon points="12,7 17,9.5 17,14.5 12,17 7,14.5 7,9.5"
                     stroke="#00e5ff" stroke-width="1" fill="rgba(0,229,255,.08)"/>
            <circle cx="12" cy="12" r="2" fill="#00e5ff"/>
          </svg>
        </div>

        <div x-show="sidebarOpen" class="overflow-hidden flex-1">
          <div class="text-[11px] font-mono font-semibold tracking-[.25em] text-neon text-glow">NEXUS</div>
          <div class="text-[8px] font-mono text-gray-600 tracking-[.12em] uppercase mt-0.5">Intelligence Platform</div>
        </div>

        <!-- Bouton réduire -->
        <button
          @click="sidebarOpen = !sidebarOpen"
          class="text-gray-600 hover:text-gray-300 transition-colors flex-shrink-0"
          :aria-label="sidebarOpen ? 'Réduire la navigation' : 'Développer la navigation'"
          :aria-expanded="sidebarOpen"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path x-show="sidebarOpen"  d="M15 18l-6-6 6-6"/>
            <path x-show="!sidebarOpen" d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>

      <!-- Items de navigation -->
      <nav class="flex-1 py-2 px-1.5 space-y-0.5 overflow-hidden" aria-label="Modules de l'application">
        <template x-for="item in navItems" :key="item.id">
          <button
            @click="setView(item.id)"
            :class="['nav-item w-full flex items-center gap-2.5 px-2 py-2.5 rounded text-left',
                     currentView === item.id ? 'active' : 'text-gray-500']"
            :aria-current="currentView === item.id ? 'page' : false"
            :title="!sidebarOpen ? item.label : ''"
          >
            <span
              class="flex-shrink-0 w-4 flex justify-center"
              x-html="item.icon"
              aria-hidden="true"
            ></span>
            <span
              x-show="sidebarOpen"
              class="text-[9px] font-mono tracking-[.12em] uppercase truncate flex-1"
              x-text="item.label"
            ></span>
            <span
              x-show="sidebarOpen && item.badge"
              class="text-[8px] font-mono px-1.5 py-0.5 rounded flex-shrink-0"
              :class="item.badgeClass"
              x-text="item.badge"
              aria-hidden="true"
            ></span>
          </button>
        </template>
      </nav>

      <!-- Profil utilisateur -->
      <div class="border-t border-ink px-2 py-2.5">
        <div class="flex items-center gap-2 overflow-hidden">
          <div class="w-7 h-7 rounded bg-ink flex items-center justify-center flex-shrink-0 border border-neon/20"
               aria-hidden="true">
            <span class="text-[9px] font-mono text-neon font-semibold">AN</span>
          </div>
          <div x-show="sidebarOpen" class="overflow-hidden flex-1">
            <div class="text-[9px] font-mono text-gray-300 truncate">Analyste Senior</div>
            <div class="flex items-center gap-1 mt-0.5">
              <div class="status-live" aria-hidden="true"></div>
              <span class="text-[8px] font-mono text-clear">CONNECTÉ · TS/SCI</span>
            </div>
          </div>
        </div>
      </div>
    </aside>


    <!-- ──────────────────────────────────────────────────────────
         ZONE PRINCIPALE
         ────────────────────────────────────────────────────────── -->
    <div class="flex flex-col flex-1 overflow-hidden min-w-0">

      <!-- ── EN-TÊTE ─────────────────────────────────────────── -->
      <header
        class="h-14 bg-surface border-b border-ink flex items-center gap-3 px-4 flex-shrink-0 z-10"
        role="banner"
      >

        <!-- Recherche universelle -->
        <div class="flex-1 max-w-xl relative">
          <div class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-600 pointer-events-none" aria-hidden="true">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <input
            type="search"
            x-model="searchQuery"
            @input.debounce.200ms="onSearch()"
            placeholder="Rechercher entités, événements, transactions…"
            class="w-full bg-void border border-ink rounded text-[10px] font-mono text-gray-300
                   placeholder-gray-700 py-1.5 pl-8 pr-10
                   focus:outline-none focus:border-cyan-800/60 transition-colors"
            aria-label="Recherche globale"
            autocomplete="off"
            spellcheck="false"
          />
          <div
            class="absolute right-2.5 top-1/2 -translate-y-1/2 text-[9px] font-mono text-gray-700 select-none"
            aria-hidden="true"
          >⌘K</div>
        </div>

        <!-- Séparateur -->
        <div class="h-5 w-px bg-ink flex-shrink-0" aria-hidden="true"></div>

        <!-- Indicateur LIVE -->
        <div class="flex items-center gap-1.5 flex-shrink-0" aria-label="Flux de données en direct actif">
          <div class="status-live" aria-hidden="true"></div>
          <span class="text-[9px] font-mono text-gray-600 hidden sm:inline">FLUX DIRECT</span>
        </div>

        <!-- Horloge UTC -->
        <div
          class="text-[9px] font-mono text-gray-600 hidden md:block flex-shrink-0 tabular-nums"
          x-text="currentTime"
          aria-label="Heure UTC actuelle"
          aria-live="off"
        ></div>

        <!-- Séparateur -->
        <div class="h-5 w-px bg-ink flex-shrink-0" aria-hidden="true"></div>

        <!-- Cloche alertes -->
        <button
          @click="setView('dashboard')"
          class="relative text-gray-500 hover:text-signal transition-colors flex-shrink-0"
          :aria-label="criticalCount + ' alertes critiques actives'"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span
            class="absolute -top-1 -right-1.5 w-3.5 h-3.5 bg-threat rounded-full text-[7px]
                   flex items-center justify-center font-mono font-bold text-white"
            x-text="criticalCount"
            aria-hidden="true"
          ></span>
        </button>

        <!-- Paramètres -->
        <button
          class="text-gray-600 hover:text-gray-300 transition-colors flex-shrink-0"
          aria-label="Paramètres"
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                     a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                     A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                     l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                     A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                     l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                     a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                     l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                     a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </header>

      <!-- ── CONTENU + PANNEAU DROIT ─────────────────────────── -->
      <div class="flex flex-1 overflow-hidden">

        <!-- ────────────────────────────────────────────────────
             CONTENEUR DES VUES (injecté par js/loader.js)
             ──────────────────────────────────────────────────── -->
        <main
          id="main-views"
          class="flex-1 overflow-hidden min-w-0 grid-bg"
          role="main"
        >
          <!-- Les vues dashboard, explorer, nexus, map
               sont injectées ici dynamiquement par loader.js -->
        </main>


        <!-- ────────────────────────────────────────────────────
             PANNEAU DROIT — ONTOLOGIE / PROPRIÉTÉS D'OBJET
             ──────────────────────────────────────────────────── -->
        <aside
          x-show="selectedEntity"
          class="w-72 bg-surface border-l border-ink flex flex-col flex-shrink-0 overflow-hidden"
          role="complementary"
          aria-label="Propriétés de l'entité sélectionnée"
        >

          <!-- En-tête panneau -->
          <div class="flex items-center justify-between px-3 py-2.5 border-b border-ink flex-shrink-0">
            <h2 class="text-[8px] font-mono text-gray-600 tracking-[.2em] uppercase">
              Propriétés de l'Objet
            </h2>
            <button
              @click="selectedEntity = null"
              class="text-gray-600 hover:text-gray-300 transition-colors"
              aria-label="Fermer le panneau de propriétés"
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="18" y1="6"  x2="6"  y2="18"/>
                <line x1="6"  y1="6"  x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          <!-- Identité + Score de risque -->
          <div class="px-3 py-3 border-b border-ink flex-shrink-0">

            <div class="flex items-center gap-1.5 mb-1.5">
              <span
                class="text-[7px] font-mono px-1.5 py-0.5 rounded"
                :class="'badge-' + selectedEntity?.type"
                x-text="selectedEntity?.type"
              ></span>
              <span class="text-[8px] font-mono text-gray-700" x-text="selectedEntity?.id"></span>
            </div>

            <h3
              class="font-mono font-semibold text-[13px] text-gray-100 mb-0.5"
              x-text="selectedEntity?.name"
            ></h3>
            <p class="text-[9px] font-mono text-gray-600" x-text="selectedEntity?.subtitle"></p>

            <!-- Anneau de risque SVG -->
            <div class="flex items-center gap-3 mt-3">
              <div class="relative w-12 h-12 flex-shrink-0" aria-hidden="true">
                <svg class="risk-ring w-12 h-12 -rotate-90" viewBox="0 0 48 48">
                  <circle cx="24" cy="24" r="19" stroke="#1a2535" stroke-width="3" fill="none"/>
                  <circle
                    cx="24" cy="24" r="19"
                    :stroke="riskColor(selectedEntity?.risk)"
                    stroke-width="3" fill="none"
                    stroke-linecap="round"
                    :stroke-dasharray="119.4"
                    :stroke-dashoffset="119.4 - ((selectedEntity?.risk ?? 0) / 100) * 119.4"
                  />
                </svg>
                <span
                  class="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold"
                  :style="'color:' + riskColor(selectedEntity?.risk)"
                  x-text="selectedEntity?.risk ?? '—'"
                ></span>
              </div>
              <div>
                <div class="text-[7px] font-mono text-gray-700 uppercase tracking-wider">Score de Risque</div>
                <div
                  class="text-[10px] font-mono font-semibold"
                  :style="'color:' + riskColor(selectedEntity?.risk)"
                  x-text="riskLabel(selectedEntity?.risk)"
                ></div>
                <div class="text-[8px] font-mono text-gray-600 mt-0.5">
                  Statut: <span class="text-gray-400" x-text="selectedEntity?.status ?? '—'"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Corps scrollable -->
          <div class="flex-1 overflow-auto">

            <!-- Propriétés détaillées -->
            <div class="px-3 py-2.5 border-b border-ink">
              <div class="text-[7px] font-mono text-gray-700 tracking-[.2em] uppercase mb-2">
                Propriétés
              </div>
              <dl class="space-y-1.5">
                <template x-for="prop in entityProps()" :key="prop.key">
                  <div class="flex items-start justify-between gap-2">
                    <dt class="text-[8px] font-mono text-gray-700 uppercase tracking-wider flex-shrink-0"
                        x-text="prop.key"></dt>
                    <dd class="text-[8px] font-mono text-gray-300 text-right break-all"
                        x-text="prop.value"></dd>
                  </div>
                </template>
              </dl>
            </div>

            <!-- Connexions liées -->
            <div class="px-3 py-2.5 border-b border-ink">
              <div class="text-[7px] font-mono text-gray-700 tracking-[.2em] uppercase mb-2">
                Connexions
                <span
                  x-show="relatedEntities().length > 0"
                  class="ml-1.5 text-gray-600 normal-case"
                  x-text="'(' + relatedEntities().length + ')'"
                ></span>
              </div>
              <div class="space-y-0.5" role="list" aria-label="Entités liées">
                <template x-for="rel in relatedEntities()" :key="rel.id + rel.linkType">
                  <button
                    @click="selectEntityById(rel.id)"
                    class="w-full flex items-center justify-between py-1.5 px-2 rounded text-left
                           hover:bg-white/[.03] transition-colors border border-transparent
                           hover:border-ink group"
                    role="listitem"
                    :aria-label="'Naviguer vers ' + rel.name + ', ' + rel.linkType"
                  >
                    <div class="flex items-center gap-1.5 min-w-0">
                      <div
                        class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                        :style="'background:' + riskColor(rel.risk)"
                        aria-hidden="true"
                      ></div>
                      <span class="text-[9px] font-mono text-gray-300 truncate" x-text="rel.name"></span>
                    </div>
                    <span
                      class="text-[7px] font-mono text-gray-700 flex-shrink-0 ml-1 group-hover:text-gray-500"
                      x-text="rel.linkType"
                    ></span>
                  </button>
                </template>
                <div
                  x-show="relatedEntities().length === 0"
                  class="text-[8px] font-mono text-gray-700 py-1"
                >Aucune connexion enregistrée</div>
              </div>
            </div>

            <!-- Actions rapides -->
            <div class="px-3 py-2.5">
              <div class="text-[7px] font-mono text-gray-700 tracking-[.2em] uppercase mb-2">
                Actions Rapides
              </div>
              <div class="space-y-0.5">
                <button
                  @click="viewInNexus()"
                  class="w-full text-left text-[9px] font-mono text-gray-500
                         hover:text-cyan-300 py-1.5 px-2 rounded
                         hover:bg-cyan-900/[.1] border border-transparent
                         hover:border-cyan-900/30 transition-all"
                >
                  → Visualiser dans NEXUS
                </button>
                <button
                  @click="viewOnMap()"
                  x-show="selectedEntity?.lat"
                  class="w-full text-left text-[9px] font-mono text-gray-500
                         hover:text-emerald-400 py-1.5 px-2 rounded
                         hover:bg-emerald-900/[.08] border border-transparent
                         hover:border-emerald-900/30 transition-all"
                >
                  → Localiser sur la Carte
                </button>
                <button
                  class="w-full text-left text-[9px] font-mono text-gray-500
                         hover:text-amber-400 py-1.5 px-2 rounded
                         hover:bg-amber-900/[.08] border border-transparent
                         hover:border-amber-900/30 transition-all"
                >
                  → Générer un Rapport
                </button>
                <button
                  class="w-full text-left text-[9px] font-mono text-gray-500
                         hover:text-red-400 py-1.5 px-2 rounded
                         hover:bg-red-900/[.08] border border-transparent
                         hover:border-red-900/30 transition-all"
                >
                  → Marquer comme Critique
                </button>
              </div>
            </div>

          </div><!-- /corps scrollable -->
        </aside>

      </div><!-- /flex contenu + panneau -->
    </div><!-- /zone principale -->
  </div><!-- /app Alpine -->


  <!-- ════════════════════════════════════════════════════════════
       SCRIPTS CDN (exécutés avant le module loader.js)
       ════════════════════════════════════════════════════════════ -->
