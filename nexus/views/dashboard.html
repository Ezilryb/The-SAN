<!--
  views/dashboard.html
  ─────────────────────────────────────────────────────────────────
  Vue 1 : Tableau de Commandement
  Injectée dynamiquement par js/loader.js dans #main-views.
  Accès aux données via le composant Alpine palantirApp().
  ─────────────────────────────────────────────────────────────────
-->
<section
  x-show="currentView === 'dashboard'"
  class="view-enter h-full overflow-auto p-4 space-y-3"
  aria-label="Tableau de commandement"
>

  <!-- ── En-tête de vue ─────────────────────────────────────── -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-[10px] font-mono font-semibold tracking-[.2em] text-gray-300 uppercase">
        Tableau de Commandement
      </h1>
      <p class="text-[8px] font-mono text-gray-600 mt-0.5">
        Aperçu opérationnel temps réel &nbsp;·&nbsp;
        Classification: <span class="text-red-400">TS/SCI</span>
      </p>
    </div>
    <div class="text-[8px] font-mono text-gray-700">
      SESSION&nbsp;<span class="text-cyan-500/60">NXS-2026-0422-A</span>
    </div>
  </div>

  <!-- ── KPI Cards ──────────────────────────────────────────── -->
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-2.5">
    <template x-for="kpi in kpis" :key="kpi.id">
      <article
        class="bg-surface border border-ink rounded p-3 relative overflow-hidden"
        :class="kpi.glow"
        :aria-label="kpi.label + ': ' + kpi.value"
      >
        <div
          class="text-[8px] font-mono text-gray-600 tracking-[.15em] uppercase mb-1"
          x-text="kpi.label"
        ></div>

        <div
          class="text-2xl font-mono font-semibold leading-none"
          :class="kpi.valClass"
          x-text="kpi.value"
        ></div>

        <div class="flex items-center gap-1 mt-1.5 mb-2">
          <span class="text-[9px] font-mono" :class="kpi.chgClass" x-text="kpi.change"></span>
          <span class="text-[8px] font-mono text-gray-700">/ 24h</span>
        </div>

        <!-- Barre de progression -->
        <div class="risk-bar" aria-hidden="true">
          <div
            class="h-full rounded transition-all duration-700"
            :class="kpi.barClass"
            :style="'width:' + kpi.barPct + '%'"
          ></div>
        </div>

        <!-- Icône décorative de fond -->
        <div
          class="absolute -right-1 -bottom-1 opacity-[0.04] pointer-events-none"
          x-html="kpi.bgIcon"
          aria-hidden="true"
        ></div>
      </article>
    </template>
  </div>

  <!-- ── Graphiques ─────────────────────────────────────────── -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-2.5">

    <!-- Ingestion 24h -->
    <div class="lg:col-span-2 bg-surface border border-ink rounded p-3">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-[9px] font-mono text-gray-500 tracking-[.15em] uppercase">
          Ingestion de Données · 24h
        </h2>
        <div class="flex gap-3" aria-hidden="true">
          <span class="flex items-center gap-1 text-[8px] font-mono text-cyan-300">
            <span class="w-3 h-0.5 bg-cyan-400 inline-block rounded"></span>Flux
          </span>
          <span class="flex items-center gap-1 text-[8px] font-mono text-amber-400">
            <span class="w-3 h-0.5 bg-amber-400 inline-block rounded"></span>Alertes
          </span>
        </div>
      </div>
      <div class="relative" style="height:110px;">
        <canvas
          id="chart-ingestion"
          role="img"
          aria-label="Graphique d'ingestion de données sur 24 heures"
        ></canvas>
      </div>
    </div>

    <!-- Donut entités -->
    <div class="bg-surface border border-ink rounded p-3">
      <h2 class="text-[9px] font-mono text-gray-500 tracking-[.15em] uppercase mb-2">
        Répartition Entités
      </h2>
      <div class="relative" style="height:110px;">
        <canvas
          id="chart-entities"
          role="img"
          aria-label="Répartition des types d'entités"
        ></canvas>
      </div>
    </div>
  </div>

  <!-- ── Alertes + Menaces ───────────────────────────────────── -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-2.5">

    <!-- Flux d'alertes actives -->
    <div class="bg-surface border border-ink rounded">
      <div class="flex items-center justify-between px-3 py-2 border-b border-ink">
        <h2 class="text-[9px] font-mono text-gray-500 tracking-[.15em] uppercase">
          Flux d'Alertes Actives
        </h2>
        <span
          class="text-[8px] font-mono px-1.5 py-0.5 rounded bg-red-900/20 text-red-400 border border-red-700/30"
          x-text="alerts.length + ' actives'"
          aria-live="polite"
        ></span>
      </div>

      <div
        class="divide-y divide-ink max-h-48 overflow-auto"
        role="list"
        aria-label="Alertes actives"
      >
        <template x-for="al in alerts" :key="al.id">
          <div
            class="px-3 py-2 cursor-pointer hover:bg-white/[.02] transition-colors"
            :class="'alert-' + al.severity"
            @click="selectEntityById(al.entityId)"
            role="listitem"
            :aria-label="al.message + ' — sévérité: ' + al.severity"
          >
            <div class="flex items-start justify-between gap-2">
              <div class="min-w-0">
                <p class="text-[9px] font-mono text-gray-300 leading-snug" x-text="al.message"></p>
                <p class="text-[8px] font-mono text-gray-700 mt-0.5" x-text="al.time"></p>
              </div>
              <span
                class="text-[7px] font-mono px-1 py-0.5 rounded flex-shrink-0 uppercase"
                :class="al.severity === 'critical'
                  ? 'bg-red-900/25 text-red-400'
                  : al.severity === 'high'
                    ? 'bg-amber-900/25 text-amber-400'
                    : 'bg-gray-700/30 text-gray-500'"
                x-text="al.severity"
              ></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Menaces 7 jours -->
    <div class="bg-surface border border-ink rounded p-3">
      <h2 class="text-[9px] font-mono text-gray-500 tracking-[.15em] uppercase mb-2">
        Activité Menaces · 7 Jours
      </h2>
      <div class="relative" style="height:150px;">
        <canvas
          id="chart-threats"
          role="img"
          aria-label="Activité des menaces sur les 7 derniers jours"
        ></canvas>
      </div>
    </div>

  </div>
</section>
