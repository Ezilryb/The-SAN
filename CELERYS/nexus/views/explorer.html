<!--
  nexus/views/explorer.html
  ─────────────────────────────────────────────────────────────────
  Vue 2 : Object Explorer — Recherche universelle et navigation
  dans toutes les entités de la base de données.

  FIX : filteredEntities est désormais une méthode dans app.js.
  Tous les accès utilisent filteredEntities() avec parenthèses
  pour que Alpine.js track les dépendances (searchQuery,
  entityFilter) et re-rende lors de chaque changement.
  ─────────────────────────────────────────────────────────────────
-->
<section
  x-show="currentView === 'explorer'"
  class="view-enter h-full overflow-auto p-4"
  aria-label="Explorateur d'objets"
>

  <!-- ── En-tête ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-[10px] font-mono font-semibold tracking-[.2em] text-gray-300 uppercase">
        Object Explorer
      </h1>
      <p
        class="text-[8px] font-mono text-gray-600 mt-0.5"
        x-text="filteredEntities().length + ' entité(s) trouvée(s)'"
        aria-live="polite"
      ></p>
    </div>

    <!-- Toggle grille / liste -->
    <div class="flex items-center gap-1" role="group" aria-label="Mode d'affichage">
      <button
        @click="listView = false"
        :class="!listView
          ? 'text-cyan-300 bg-cyan-900/20 border-cyan-700/40'
          : 'text-gray-600 border-ink hover:text-gray-400'"
        class="border rounded p-1 transition-colors"
        aria-label="Vue grille"
        :aria-pressed="!listView"
      >
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button
        @click="listView = true"
        :class="listView
          ? 'text-cyan-300 bg-cyan-900/20 border-cyan-700/40'
          : 'text-gray-600 border-ink hover:text-gray-400'"
        class="border rounded p-1 transition-colors"
        aria-label="Vue liste"
        :aria-pressed="listView"
      >
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="8"  y1="6"  x2="21" y2="6"/><line x1="8"  y1="12" x2="21" y2="12"/>
          <line x1="8"  y1="18" x2="21" y2="18"/>
          <line x1="3"  y1="6"  x2="3.01" y2="6"/>
          <line x1="3"  y1="12" x2="3.01" y2="12"/>
          <line x1="3"  y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Filtres par type ────────────────────────────────────── -->
  <div
    class="flex flex-wrap gap-1.5 mb-3"
    role="group"
    aria-label="Filtres par type d'entité"
  >
    <template x-for="f in typeFilters" :key="f.id">
      <button
        @click="entityFilter = f.id"
        :class="['text-[8px] font-mono px-2.5 py-1 rounded border transition-all',
                 entityFilter === f.id ? f.activeClass : 'border-ink text-gray-600 hover:text-gray-400']"
        :aria-pressed="entityFilter === f.id"
      >
        <span x-text="f.label"></span>
        <span class="ml-1 opacity-50" x-text="'(' + getCount(f.id) + ')'"></span>
      </button>
    </template>
  </div>

  <!-- ── Grille / Liste d'entités ───────────────────────────── -->
  <div
    :class="listView
      ? 'space-y-1.5'
      : 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2'"
    role="list"
    aria-label="Entités"
  >
    <!--
      filteredEntities() avec () — Alpine évalue cette expression,
      accède à this.searchQuery et this.entityFilter à l'intérieur
      de la méthode, et re-rend la liste à chaque changement.
    -->
    <template x-for="ent in filteredEntities()" :key="ent.id">
      <article
        @click="selectEntity(ent)"
        :class="['entity-card bg-surface border border-ink rounded p-3 cursor-pointer',
                 selectedEntity?.id === ent.id ? 'selected' : '']"
        role="listitem"
        :aria-selected="selectedEntity?.id === ent.id"
        :aria-label="ent.type + ' ' + ent.name + ', risque ' + ent.risk + ' sur 100'"
      >
        <!-- Type + ID + Score risque -->
        <div class="flex items-start justify-between mb-1.5">
          <div class="flex items-center gap-1.5">
            <span
              class="text-[7px] font-mono px-1.5 py-0.5 rounded"
              :class="'badge-' + ent.type"
              x-text="ent.type"
            ></span>
            <span class="text-[8px] font-mono text-gray-700" x-text="ent.id"></span>
          </div>
          <div class="flex items-center gap-1">
            <div
              class="w-1.5 h-1.5 rounded-full flex-shrink-0"
              :style="'background:' + riskColor(ent.risk)"
              aria-hidden="true"
            ></div>
            <span
              class="text-[9px] font-mono font-semibold"
              :style="'color:' + riskColor(ent.risk)"
              x-text="ent.risk"
            ></span>
          </div>
        </div>

        <!-- Nom + sous-titre -->
        <p class="font-mono font-medium text-[12px] text-gray-200 mb-0.5 truncate" x-text="ent.name"></p>
        <p class="text-[9px] font-mono text-gray-600 mb-2 truncate" x-text="ent.subtitle"></p>

        <!-- Barre risque -->
        <div class="risk-bar" aria-hidden="true">
          <div
            class="h-full rounded"
            :style="'width:' + ent.risk + '%;background:' + riskColor(ent.risk)"
          ></div>
        </div>
      </article>
    </template>
  </div>

  <!-- ── État vide ──────────────────────────────────────────── -->
  <div
    x-show="filteredEntities().length === 0"
    class="text-center py-20"
    role="status"
    aria-live="polite"
  >
    <p class="text-gray-700 font-mono text-xs">// AUCUNE ENTITÉ TROUVÉE</p>
    <p class="text-gray-800 font-mono text-[9px] mt-1" x-text="'requête: \'' + searchQuery + '\''"></p>
  </div>

</section>
