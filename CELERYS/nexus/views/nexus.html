<!--
  views/nexus.html
  ─────────────────────────────────────────────────────────────────
  Vue 3 : NEXUS — Graph Link Analysis (Vis.js Network)
  Le canvas est initialisé par js/modules/nexus.js via app.js.
  ─────────────────────────────────────────────────────────────────
-->
<section
  x-show="currentView === 'nexus'"
  class="view-enter h-full flex flex-col"
  aria-label="Analyse de liens NEXUS"
>

  <!-- ── En-tête ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between px-4 py-2.5 border-b border-ink bg-surface flex-shrink-0">
    <div>
      <h1 class="text-[10px] font-mono font-semibold tracking-[.2em] text-gray-300 uppercase">
        NEXUS · Graph Link Analysis
      </h1>
      <p class="text-[8px] font-mono text-gray-600">
        <span x-text="entities.length"></span> nœuds
        &nbsp;·&nbsp;
        <span x-text="links.length"></span> connexions
      </p>
    </div>

    <!-- Contrôles -->
    <div class="flex items-center gap-2">
      <button
        @click="fitNexus()"
        class="text-[8px] font-mono px-2 py-1 border border-ink rounded
               text-gray-500 hover:text-gray-200 hover:border-gray-600 transition-all"
        aria-label="Ajuster le zoom pour afficher tous les nœuds"
      >
        ⊡ Ajuster
      </button>
      <button
        @click="resetNexus()"
        class="text-[8px] font-mono px-2 py-1 border border-ink rounded
               text-gray-500 hover:text-gray-200 hover:border-gray-600 transition-all"
        aria-label="Restabiliser le graphe"
      >
        ↺ Stabiliser
      </button>
    </div>
  </div>

  <!-- ── Légende types ──────────────────────────────────────── -->
  <div
    class="flex items-center flex-wrap gap-4 px-4 py-1.5 border-b border-ink bg-surface/60 flex-shrink-0"
    aria-label="Légende des types de nœuds"
  >
    <template x-for="f in typeFilters.slice(1)" :key="f.id">
      <div class="flex items-center gap-1.5">
        <div
          class="w-2 h-2 rounded-full"
          :style="'background:' + f.graphColor"
          aria-hidden="true"
        ></div>
        <span class="text-[8px] font-mono text-gray-600" x-text="f.label"></span>
      </div>
    </template>
  </div>

  <!-- ── Canvas Vis.js ──────────────────────────────────────── -->
  <div class="flex-1 relative overflow-hidden">

    <!-- Conteneur Vis.js -->
    <div
      id="nexus-graph"
      class="w-full h-full"
      role="img"
      aria-label="Graphe interactif des connexions entre entités"
    ></div>

    <!-- Tooltip nœud survolé -->
    <div
      x-show="hoveredNode"
      class="absolute bottom-4 left-4 bg-surface border border-cyan-900/40 rounded p-2.5
             pointer-events-none glow-sm z-10"
      role="tooltip"
      aria-live="polite"
    >
      <div class="text-[7px] font-mono text-gray-600 uppercase mb-0.5" x-text="hoveredNode?.type"></div>
      <div class="text-[11px] font-mono text-gray-200 font-semibold" x-text="hoveredNode?.name"></div>
      <div class="text-[8px] font-mono mt-1">
        <span class="text-gray-600">RISQUE:&nbsp;</span>
        <span
          :style="'color:' + riskColor(hoveredNode?.risk)"
          x-text="(hoveredNode?.risk ?? '—') + '/100'"
        ></span>
        <span class="text-gray-600 ml-2">STATUT:&nbsp;</span>
        <span class="text-gray-400" x-text="hoveredNode?.status ?? '—'"></span>
      </div>
    </div>

    <!-- Indicateur de chargement / stabilisation -->
    <div
      x-show="nexusLoading"
      class="absolute inset-0 flex items-center justify-center bg-void/80 z-20"
      role="status"
      aria-live="polite"
    >
      <div class="text-center">
        <div class="text-[9px] font-mono text-gray-600">
          <span class="blink" aria-hidden="true">█</span>
          &nbsp;CONSTRUCTION DU GRAPHE…
        </div>
        <div class="text-[8px] font-mono text-gray-800 mt-1">Stabilisation de la physique</div>
      </div>
    </div>

  </div>
</section>
