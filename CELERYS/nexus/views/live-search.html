<!--
  views/live-search.html
  ─────────────────────────────────────────────────────────────────
  Vue 5 : OSINT Live Search — Recherche en temps réel
  Interroge des APIs publiques CORS-enabled sans clé.
  Providers : IP Lookup · DNS/Domain · GitHub · Géocodage · SSL
  ─────────────────────────────────────────────────────────────────
-->
<section
  x-show="currentView === 'live-search'"
  class="view-enter h-full flex flex-col overflow-hidden"
  aria-label="Recherche OSINT en temps réel"
>

  <!-- ── En-tête ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between px-4 py-2.5 border-b border-ink bg-surface flex-shrink-0">
    <div>
      <h1 class="text-[10px] font-mono font-semibold tracking-[.2em] text-gray-300 uppercase">
        OSINT · Recherche Live
      </h1>
      <p class="text-[8px] font-mono text-gray-600">
        APIs publiques en temps réel · Sans clé requise
      </p>
    </div>
    <!-- Indicateur sources -->
    <div class="flex items-center gap-2 flex-wrap" role="list" aria-label="Sources disponibles">
      <template x-for="p in liveProviders" :key="p.id">
        <div
          class="flex items-center gap-1 text-[7px] font-mono px-1.5 py-0.5 rounded border"
          :style="'border-color:' + p.color + '40; color:' + p.color + 'cc'"
          role="listitem"
          :aria-label="p.label + ' disponible'"
        >
          <span x-text="p.icon" aria-hidden="true"></span>
          <span x-text="p.label"></span>
        </div>
      </template>
    </div>
  </div>

  <!-- ── Barre de recherche principale ─────────────────────── -->
  <div class="px-4 py-3 border-b border-ink bg-surface/60 flex-shrink-0">

    <!-- Sélection du provider -->
    <div
      class="flex flex-wrap gap-1.5 mb-2.5"
      role="group"
      aria-label="Sélection du type de recherche"
    >
      <button
        @click="liveType = 'AUTO'"
        :class="['text-[8px] font-mono px-2.5 py-1 rounded border transition-all',
                 liveType === 'AUTO'
                   ? 'border-gray-500 text-gray-300 bg-gray-700/20'
                   : 'border-ink text-gray-600 hover:text-gray-400']"
        :aria-pressed="liveType === 'AUTO'"
      >
        ◈ AUTO
      </button>
      <template x-for="p in liveProviders" :key="p.id">
        <button
          @click="liveType = p.id"
          :class="['text-[8px] font-mono px-2.5 py-1 rounded border transition-all',
                   liveType === p.id
                     ? 'border-current text-current'
                     : 'border-ink text-gray-600 hover:text-gray-400']"
          :style="liveType === p.id ? 'border-color:' + p.color + '60; color:' + p.color + '; background:' + p.color + '18' : ''"
          :aria-pressed="liveType === p.id"
          :aria-label="'Rechercher via ' + p.label"
        >
          <span x-text="p.icon + ' ' + p.label" aria-hidden="true"></span>
        </button>
      </template>
    </div>

    <!-- Input + bouton -->
    <div class="flex gap-2">
      <div class="relative flex-1">
        <input
          type="search"
          x-model="liveQuery"
          @keydown.enter="runLive()"
          :placeholder="livePlaceholder"
          class="w-full bg-void border border-ink rounded text-[10px] font-mono text-gray-300
                 placeholder-gray-700 py-2 px-3 pr-10
                 focus:outline-none focus:border-cyan-800/60 transition-colors"
          :disabled="liveLoading"
          aria-label="Requête de recherche OSINT"
          autocomplete="off"
          spellcheck="false"
        />
        <!-- Spinner intégré -->
        <div
          x-show="liveLoading"
          class="absolute right-3 top-1/2 -translate-y-1/2"
          aria-hidden="true"
        >
          <svg class="animate-spin w-3 h-3 text-cyan-400" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4" stroke-dashoffset="10"/>
          </svg>
        </div>
      </div>
      <button
        @click="runLive()"
        :disabled="liveLoading || !liveQuery.trim()"
        class="text-[9px] font-mono px-4 py-2 rounded border transition-all
               disabled:opacity-40 disabled:cursor-not-allowed"
        :class="liveLoading
          ? 'border-ink text-gray-600'
          : 'border-cyan-700/40 text-cyan-300 bg-cyan-900/15 hover:bg-cyan-900/25'"
        aria-label="Lancer la recherche OSINT"
      >
        <span x-show="!liveLoading">⊛ SCAN</span>
        <span x-show="liveLoading">…</span>
      </button>
    </div>

    <!-- Message d'erreur -->
    <div
      x-show="liveError"
      x-transition
      class="mt-2 text-[8px] font-mono text-red-400 flex items-center gap-1.5"
      role="alert"
      aria-live="assertive"
    >
      <span aria-hidden="true">⚠</span>
      <span x-text="liveError"></span>
    </div>
  </div>

  <!-- ── Zone résultats ─────────────────────────────────────── -->
  <div class="flex-1 overflow-auto p-4">

    <!-- État initial (aucune recherche) -->
    <div
      x-show="!liveResults.length && !liveLoading && !liveError && !liveSearchDone"
      class="flex flex-col items-center justify-center h-full text-center py-20"
    >
      <div class="text-gray-700 font-mono text-[10px] mb-3 tracking-[.15em]">// AUCUNE REQUÊTE ACTIVE</div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 max-w-2xl mt-4">
        <template x-for="ex in liveExamples" :key="ex.query">
          <button
            @click="liveType = ex.type; liveQuery = ex.query; runLive()"
            class="text-left p-3 border border-ink rounded hover:border-ink/60 hover:bg-white/[.02] transition-all"
          >
            <div class="text-[7px] font-mono text-gray-700 uppercase tracking-wider mb-1" x-text="ex.label"></div>
            <div class="text-[9px] font-mono text-gray-400" x-text="ex.query"></div>
          </button>
        </template>
      </div>
    </div>

    <!-- Chargement -->
    <div
      x-show="liveLoading"
      class="flex flex-col items-center justify-center h-full py-20"
      role="status"
      aria-live="polite"
    >
      <div class="text-[9px] font-mono text-gray-600 tracking-[.15em]">
        <span class="blink" aria-hidden="true">█</span>
        &nbsp;INTERROGATION DES SOURCES…
      </div>
      <div class="text-[8px] font-mono text-gray-800 mt-1.5" x-text="liveStatusMsg"></div>
    </div>

    <!-- Résultats -->
    <div x-show="liveResults.length > 0 && !liveLoading">

      <!-- Méta-info de la requête -->
      <div class="flex items-center justify-between mb-3">
        <div>
          <span class="text-[8px] font-mono text-gray-600">
            <span x-text="liveResults.length"></span> entité(s) trouvée(s)
          </span>
          <span
            x-show="liveProviderLabel"
            class="ml-2 text-[7px] font-mono px-1.5 py-0.5 rounded border"
            :style="'border-color:' + liveProviderColor + '40; color:' + liveProviderColor"
            x-text="liveProviderLabel"
          ></span>
        </div>
        <button
          @click="importLiveResults()"
          class="text-[8px] font-mono px-3 py-1 rounded border transition-all
                 border-emerald-700/40 text-emerald-400 bg-emerald-900/10
                 hover:bg-emerald-900/20"
          aria-label="Importer les résultats dans le graphe NEXUS"
        >
          ↓ Importer dans NEXUS
        </button>
      </div>

      <!-- Grille de résultats -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2">
        <template x-for="ent in liveResults" :key="ent.id">
          <article
            @click="selectEntity(ent)"
            :class="['entity-card bg-surface border border-ink rounded p-3 cursor-pointer',
                     selectedEntity?.id === ent.id ? 'selected' : '']"
            :aria-selected="selectedEntity?.id === ent.id"
            :aria-label="ent.type + ' ' + ent.name"
          >
            <!-- Type + badge LIVE -->
            <div class="flex items-start justify-between mb-1.5">
              <div class="flex items-center gap-1.5">
                <span
                  class="text-[7px] font-mono px-1.5 py-0.5 rounded"
                  :class="'badge-' + ent.type"
                  x-text="ent.type"
                ></span>
                <!-- Badge LIVE -->
                <span
                  class="text-[6px] font-mono px-1 py-0.5 rounded"
                  style="background:rgba(0,200,150,.1);color:#00c896;border:1px solid rgba(0,200,150,.3)"
                >LIVE</span>
              </div>
              <!-- Carte / géoloc disponible -->
              <span
                x-show="ent.lat"
                class="text-[7px] font-mono text-gray-700"
                aria-label="Coordonnées GPS disponibles"
                title="GPS disponible"
              >◉</span>
            </div>

            <!-- Nom + sous-titre -->
            <p class="font-mono font-medium text-[12px] text-gray-200 mb-0.5 truncate" x-text="ent.name"></p>
            <p class="text-[9px] font-mono text-gray-600 mb-2 truncate" x-text="ent.subtitle"></p>

            <!-- Provider source -->
            <div class="text-[7px] font-mono text-gray-700 mt-1" x-text="ent._provider || '—'"></div>

            <!-- Lien externe si dispo -->
            <a
              x-show="ent._url"
              :href="ent._url"
              target="_blank"
              rel="noopener noreferrer"
              @click.stop
              class="text-[7px] font-mono text-cyan-700 hover:text-cyan-400 transition-colors mt-1 inline-block"
              aria-label="Ouvrir le profil externe dans un nouvel onglet"
            >
              ↗ Ouvrir le profil
            </a>

            <!-- Propriétés condensées -->
            <div class="border-t border-ink mt-2 pt-2 space-y-1">
              <template x-for="prop in Object.entries(ent.props || {}).slice(0, 4)" :key="prop[0]">
                <div class="flex items-start justify-between gap-2">
                  <span class="text-[7px] font-mono text-gray-700 uppercase flex-shrink-0" x-text="prop[0]"></span>
                  <span class="text-[7px] font-mono text-gray-400 text-right break-all" x-text="prop[1]"></span>
                </div>
              </template>
              <div
                x-show="Object.keys(ent.props || {}).length > 4"
                class="text-[7px] font-mono text-gray-700"
                x-text="'+ ' + (Object.keys(ent.props || {}).length - 4) + ' propriété(s) — cliquer pour voir'"
              ></div>
            </div>
          </article>
        </template>
      </div>
    </div>

    <!-- Résultats vides après recherche -->
    <div
      x-show="liveSearchDone && !liveResults.length && !liveLoading && !liveError"
      class="text-center py-20"
      role="status"
      aria-live="polite"
    >
      <p class="text-gray-700 font-mono text-xs">// AUCUN RÉSULTAT TROUVÉ</p>
      <p class="text-gray-800 font-mono text-[9px] mt-1" x-text="'requête: \'' + liveQuery + '\''"></p>
    </div>

  </div><!-- /zone résultats -->

  <!-- ── Notification import ─────────────────────────────── -->
  <div
    x-show="liveImportMsg"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2"
    class="fixed bottom-4 right-4 z-50 bg-surface border border-emerald-700/40 rounded px-3 py-2
           text-[8px] font-mono text-emerald-400 shadow-lg"
    role="status"
    aria-live="polite"
    x-text="liveImportMsg"
  ></div>

</section>
