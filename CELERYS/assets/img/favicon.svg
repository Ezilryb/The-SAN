  <line x1="16" y1="4"  x2="16" y2="9"  stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="28" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="9"  y2="16" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="28" y2="16" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
